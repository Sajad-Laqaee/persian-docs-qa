version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: docsqa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: docsqa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: docsqa_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data: