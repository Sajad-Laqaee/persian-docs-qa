version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: docsqa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: docsqa_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  web:
    build: .
    container_name: docsqa_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # override hostها برای شبکه داخلی داکر
      DB_HOST: postgres
      DB_PORT: 5432
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
      - hf_cache:/root/.cache/huggingface   # کش مدل‌ها (مهم!)
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

volumes:
  postgres_data:
  qdrant_data:
  media_data:
  static_data:
  hf_cache: